name: stale

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and pull requests
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >-
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed if no further activity occurs.
          stale-pr-message: >-
            This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed if no further activity occurs.
          close-issue-message: >-
            This issue was closed automatically due to inactivity.
            Please reopen if this is still relevant.
          close-pr-message: >-
            This pull request was closed automatically due to inactivity.
            Please reopen if you want to continue this work.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,help-wanted,good-first-issue
          exempt-pr-labels: pinned,security,dependencies
          days-before-stale: 60
          days-before-close: 14
